[build]
  base = "frontend"
  command = "npm install --legacy-peer-deps && npm rebuild @tailwindcss/oxide --update-binary || true && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  NPM_CONFIG_UNSAFE_PERM = "true"
  NPM_FLAGS = "--legacy-peer-deps"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200